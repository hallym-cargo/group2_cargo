spring:
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

        jpa:
            hibernate:
                ddl-auto: update
            show-sql: true
            properties:
                hibernate:
                    format_sql: true
                    dialect: org.hibernate.dialect.PostgreSQLDialect

        jackson:
            serialization:
                write-dates-as-timestamps: false

server:
    port: ${PORT:8080}

app:
    cors:
        allowed-origin: ${APP_FRONTEND_ORIGIN:http://localhost:5173}
    jwt:
        secret: ${APP_JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
        access-expiration-minutes: ${APP_JWT_EXP_MIN:720}

    tmap:
        app-key: ${TMAP_APP_KEY:58gaUoZNnGcuRTIDz7hD5PxkVw8wd6nxyZYwhVc0}
